server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript image/svg+xml;

    # Proxy API calls to the api service (Docker Compose network).
    # Re-resolve `api` via Docker's embedded DNS instead of caching the IP
    # for the worker's lifetime — otherwise nginx keeps talking to a stale
    # address whenever the api container is recreated (deploys, restarts).
    resolver 127.0.0.11 valid=10s;
    location /api/ {
        set $api_upstream http://api:4000;
        proxy_pass $api_upstream/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Immutable, hashed assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
