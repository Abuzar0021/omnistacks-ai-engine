name: omnistacks

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL — application database + n8n database
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-omnistacks}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-omnistacks}
      POSTGRES_DB: ${POSTGRES_DB:-omnistacks}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-omnistacks} -d ${POSTGRES_DB:-omnistacks}']
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # API — Node.js + Express + Prisma (runs migrations on boot)
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      API_PORT: 4000
      API_CORS_ORIGIN: ${API_CORS_ORIGIN:-http://localhost:8080}
      DATABASE_URL: postgresql://${POSTGRES_USER:-omnistacks}:${POSTGRES_PASSWORD:-omnistacks}@postgres:5432/${POSTGRES_DB:-omnistacks}?schema=public
      JWT_SECRET: ${JWT_SECRET:-change-me}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-anthropic/claude-sonnet-4.5}
      PLAYWRIGHT_HEADLESS: 'true'
      ANALYSIS_MAX_CONCURRENCY: ${ANALYSIS_MAX_CONCURRENCY:-2}
      ANALYSIS_NAVIGATION_TIMEOUT_MS: ${ANALYSIS_NAVIGATION_TIMEOUT_MS:-30000}
      ANALYSIS_STABLE_TIMEOUT_MS: ${ANALYSIS_STABLE_TIMEOUT_MS:-5000}
      SCREENSHOT_STORAGE_DIR: ./storage/screenshots
      # BUSINESS_CONTEXT/OUTREACH_* fall back to empty only if unset on the host
      # AND there's no repo-root .env (Compose reads that for substitution) —
      # copy .env.example to .env to get the app's built-in default text/values.
      BUSINESS_CONTEXT: ${BUSINESS_CONTEXT:-}
      AUDIT_MAX_CONCURRENCY: ${AUDIT_MAX_CONCURRENCY:-2}
      OUTREACH_SENDER_NAME: ${OUTREACH_SENDER_NAME:-}
      OUTREACH_EMAIL_TEMPLATE: ${OUTREACH_EMAIL_TEMPLATE:-}
      EMAIL_DRAFT_MAX_CONCURRENCY: ${EMAIL_DRAFT_MAX_CONCURRENCY:-2}
      N8N_API_BASE_URL: ${N8N_API_BASE_URL:-http://n8n:5678}
      N8N_WEBHOOK_SECRET: ${N8N_WEBHOOK_SECRET:-change-me}
    ports:
      - '${API_PORT:-4000}:4000'
    volumes:
      - api_screenshots:/app/apps/api/storage/screenshots
    depends_on:
      postgres:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Web — React SPA served by nginx (proxies /api to the api service)
  # ---------------------------------------------------------------------------
  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
      args:
        VITE_API_URL: /api
    restart: unless-stopped
    ports:
      - '${WEB_PORT:-8080}:80'
    depends_on:
      - api

  # ---------------------------------------------------------------------------
  # Worker — Playwright scraping/enrichment jobs
  # ---------------------------------------------------------------------------
  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-omnistacks}:${POSTGRES_PASSWORD:-omnistacks}@postgres:5432/${POSTGRES_DB:-omnistacks}?schema=public
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-2}
      PLAYWRIGHT_HEADLESS: 'true'
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
    depends_on:
      postgres:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # n8n — workflow automation (webhooks, outreach sequences, integrations)
  # ---------------------------------------------------------------------------
  n8n:
    image: n8nio/n8n:1.74.1
    restart: unless-stopped
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-omnistacks}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD:-omnistacks}
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: 5678
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      WEBHOOK_URL: ${WEBHOOK_URL:-http://localhost:5678/}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:-change-me}
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE:-UTC}
      # Exposed to workflow expressions as $env.* — see n8n/workflows/*.json
      # and docs/N8N.md. N8N_BLOCK_ENV_ACCESS_IN_NODE must stay 'false' (n8n's
      # default) for $env to be readable from expressions.
      API_BASE_URL: ${API_BASE_URL:-http://api:4000/api}
      N8N_WEBHOOK_SECRET: ${N8N_WEBHOOK_SECRET:-change-me}
      OUTREACH_FROM_EMAIL: ${OUTREACH_FROM_EMAIL:-}
    ports:
      - '${N8N_PORT:-5678}:5678'
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  n8n_data:
  api_screenshots:
